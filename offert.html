<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offert – Offeria</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink: #0d0d0b; --paper: #f7f4ee; --cream: #ede8db; --gold: #b8902e; --gold-light: #e8d5a0; --border: #ddd8cc; }
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
.quote-doc {
  background: white; border: 1px solid var(--border); border-radius: 16px;
  padding: 2.5rem 2.5rem; max-width: 750px; width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06); font-size: 0.88rem; line-height: 1.7;
}
.q-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--gold-light); }
.q-company-name { font-family: 'Fraunces', serif; font-size: 1.3rem; margin-bottom: 0.3rem; }
.q-company-info { font-size: 0.75rem; color: #888; line-height: 1.7; }
.q-logo-preview { max-height: 80px; max-width: 140px; object-fit: contain; }
.q-meta-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
.q-offer-title { font-family: 'Fraunces', serif; font-size: 1.15rem; flex: 1; min-width: 200px; }
.q-meta { text-align: right; font-size: 0.8rem; }
.q-client { background: var(--cream); border-left: 4px solid var(--gold); padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; margin-bottom: 1.5rem; }
.q-client .lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #999; margin-bottom: 0.2rem; }
table.qt { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
table.qt th { background: var(--ink); color: white; padding: 0.6rem 0.8rem; text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
table.qt th:first-child { border-radius: 6px 0 0 0; }
table.qt th:last-child { border-radius: 0 6px 0 0; }
table.qt td { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--border); font-size: 0.84rem; }
table.qt tr:last-child td { border-bottom: none; }
.q-totals { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }
.q-totals-box { min-width: 260px; }
.trow { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.88rem; }
.trow.final-row { border-top: 2px solid var(--ink); margin-top: 0.5rem; padding-top: 0.7rem; font-weight: 700; font-size: 1.05rem; }
.rot-row { color: #2e7d32; }
.q-terms { background: var(--cream); border-radius: 8px; padding: 1rem 1.2rem; font-size: 0.79rem; color: #666; margin-bottom: 1.5rem; }
.q-terms h4 { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 0.5rem; }
.q-footer { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: #888; }
.sig-block { text-align: center; }
.sig-line { width: 180px; border-bottom: 1px solid #ccc; margin-bottom: 0.4rem; height: 40px; }
.loading { text-align: center; padding: 4rem 2rem; }
.loading h2 { font-family: 'Fraunces', serif; margin-bottom: 0.5rem; }
.error { text-align: center; padding: 4rem 2rem; color: #999; }
.brand-footer { margin-top: 2rem; text-align: center; }
.brand-footer a { font-family: 'Fraunces', serif; font-style: italic; color: var(--gold); text-decoration: none; font-weight: 700; font-size: 0.9rem; }

/* Signature section */
.sign-section {
  max-width: 750px; width: 100%; margin-top: 1.5rem;
  background: white; border: 2px solid var(--gold); border-radius: 16px;
  padding: 2rem 2.5rem; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.sign-title { font-family: 'Fraunces', serif; font-size: 1.2rem; margin-bottom: 0.3rem; }
.sign-sub { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
.sign-field { margin-bottom: 1rem; }
.sign-field label { display: block; font-size: 0.78rem; font-weight: 600; color: #555; margin-bottom: 0.3rem; }
.sign-field input { width: 100%; padding: 0.7rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; background: var(--paper); }
.sign-field input:focus { outline: none; border-color: var(--gold); }
.sign-check { display: flex; align-items: flex-start; gap: 0.6rem; margin: 1.2rem 0; font-size: 0.85rem; color: #444; line-height: 1.5; }
.sign-check input[type="checkbox"] { width: 20px; height: 20px; margin-top: 0.1rem; accent-color: var(--gold); flex-shrink: 0; }
.sign-btn {
  width: 100%; padding: 0.9rem; background: var(--gold); color: white; border: none;
  border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem;
  font-weight: 700; cursor: pointer; transition: background 0.15s;
}
.sign-btn:hover { background: #a07d26; }
.sign-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.sign-decline { display: block; text-align: center; margin-top: 0.8rem; font-size: 0.82rem; color: #999; cursor: pointer; text-decoration: underline; }
.sign-decline:hover { color: #c62828; }

/* Signed confirmation */
.signed-badge {
  max-width: 750px; width: 100%; margin-top: 1.5rem;
  background: #e8f5e9; border: 2px solid #2e7d32; border-radius: 16px;
  padding: 1.5rem 2rem; text-align: center;
}
.signed-badge h3 { font-family: 'Fraunces', serif; font-size: 1.1rem; color: #2e7d32; margin-bottom: 0.4rem; }
.signed-badge p { font-size: 0.85rem; color: #555; }

.declined-badge {
  max-width: 750px; width: 100%; margin-top: 1.5rem;
  background: #fce4ec; border: 2px solid #c62828; border-radius: 16px;
  padding: 1.5rem 2rem; text-align: center;
}
.declined-badge h3 { font-family: 'Fraunces', serif; font-size: 1.1rem; color: #c62828; margin-bottom: 0.4rem; }

@media (max-width: 640px) {
  body { padding: 0.5rem; }
  .quote-doc { padding: 1.2rem; border-radius: 8px; font-size: 0.82rem; }
  .sign-section { padding: 1.5rem 1.2rem; border-radius: 8px; }
  .q-header { flex-direction: row; flex-wrap: nowrap; gap: 0.5rem; }
  .q-header > div:first-child { flex: 1; min-width: 0; }
  .q-logo-preview { max-height: 55px; max-width: 90px; }
  .q-company-name { font-size: 1rem; }
  .q-meta-row { flex-direction: column; gap: 0.5rem; }
  .q-meta { text-align: left; }
  table.qt { font-size: 0.75rem; }
  table.qt th, table.qt td { padding: 0.5rem 0.4rem; }
  .q-totals-box { width: 100%; min-width: unset; }
  .q-footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
}
@media print {
  body { padding: 0; background: white; }
  .quote-doc { box-shadow: none; border: none; border-radius: 0; padding: 1rem; }
  .brand-footer, .sign-section, .signed-badge, .declined-badge { display: none; }
}
</style>
</head>
<body>

<div id="quoteContainer">
  <div class="loading">
    <h2>Laddar offert...</h2>
    <p style="color:#999;font-size:0.9rem">Vänta ett ögonblick</p>
  </div>
</div>

<div id="signatureArea"></div>

<div class="brand-footer">
  <a href="https://offeria.se">Offeria</a>
  <span style="font-size:0.72rem;color:#ccc;margin-left:0.3rem">– Offert, faktura &amp; bokföring</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://yfnmmcrvzcwcinwopnlj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlmbm1tY3J2emN3Y2lud29wbmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MzY4NjQsImV4cCI6MjA4NzUxMjg2NH0.MpF3oRLWwXkmrjEGJ0Qqrsw_87FixbaNHmHmPxFyXKc';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let _currentShareId = null;

async function loadQuote() {
  const container = document.getElementById('quoteContainer');
  const signArea = document.getElementById('signatureArea');
  const params = new URLSearchParams(window.location.search);
  _currentShareId = params.get('id');

  if (!_currentShareId) {
    container.innerHTML = '<div class="error"><h2>Ingen offert angiven</h2><p>Kontrollera länken och försök igen.</p></div>';
    return;
  }

  try {
    const { data, error } = await sb
      .from('quote_usage')
      .select('quote_html, title, client_name, created_at, signature_name, signature_date, signature_status')
      .eq('share_id', _currentShareId)
      .single();

    if (error || !data) {
      container.innerHTML = '<div class="error"><h2>Offerten hittades inte</h2><p>Länken kan ha gått ut eller vara felaktig.</p></div>';
      return;
    }

    // Clean the HTML
    let html = data.quote_html || '';
    html = html.replace(/<select[^>]*class="row-type-select"[^>]*>[\s\S]*?<\/select>/gi, '');
    html = html.replace(/<th[^>]*>Typ<\/th>/gi, '');
    html = html.replace(/\s*contenteditable="true"/gi, '');
    html = html.replace(/<div class="edit-hint">[\s\S]*?<\/div>/gi, '');
    html = html.replace(/<div class="add-row-btn">[\s\S]*?<\/div>/gi, '');
    html = html.replace(/<button[^>]*class="del-row-btn"[^>]*>[\s\S]*?<\/button>/gi, '');
    html = html.replace(/<button[^>]*onclick="openCustomerPickerForQuote\(\)"[^>]*>[\s\S]*?<\/button>/gi, '');
    html = html.replace(/<button[^>]*onclick="openArticlePicker\(\)"[^>]*>[\s\S]*?<\/button>/gi, '');

    container.innerHTML = '<div class="quote-doc">' + html + '</div>';
    document.title = (data.title || 'Offert') + ' – Offeria';

    // Show signature section based on status
    if (data.signature_status === 'signed') {
      const signDate = new Date(data.signature_date).toLocaleDateString('sv-SE', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      signArea.innerHTML = `<div class="signed-badge">
        <h3>Offerten är godkänd</h3>
        <p>Signerad av <strong>${data.signature_name}</strong> den ${signDate}</p>
      </div>`;
    } else if (data.signature_status === 'declined') {
      signArea.innerHTML = `<div class="declined-badge">
        <h3>Offerten har avböjts</h3>
        <p>Kontakta avsändaren för mer information.</p>
      </div>`;
    } else {
      // Show signature form
      signArea.innerHTML = `<div class="sign-section">
        <div class="sign-title">Godkänn offerten</div>
        <div class="sign-sub">Granska offerten ovan och signera digitalt nedan.</div>
        <div class="sign-field">
          <label>Ditt namn *</label>
          <input type="text" id="signName" placeholder="Förnamn Efternamn">
        </div>
        <div class="sign-field">
          <label>E-post (valfritt)</label>
          <input type="email" id="signEmail" placeholder="din@epost.se">
        </div>
        <div class="sign-check">
          <input type="checkbox" id="signConsent">
          <span>Jag har granskat offerten och godkänner villkoren. Jag förstår att detta utgör en digital signatur.</span>
        </div>
        <button class="sign-btn" id="signBtn" onclick="signQuote()">Godkänn offert</button>
        <span class="sign-decline" onclick="declineQuote()">Avböj offert</span>
        <p style="font-size:0.72rem;color:#bbb;text-align:center;margin-top:1rem">Din signatur sparas med namn, datum och tidpunkt. Detta är juridiskt bindande.</p>
      </div>`;
    }

  } catch (e) {
    console.error('Error loading quote:', e);
    container.innerHTML = '<div class="error"><h2>Något gick fel</h2><p>Försök igen senare.</p></div>';
  }
}

async function signQuote() {
  const name = document.getElementById('signName').value.trim();
  const email = document.getElementById('signEmail')?.value.trim() || '';
  const consent = document.getElementById('signConsent').checked;

  if (!name) return alert('Ange ditt namn.');
  if (!consent) return alert('Du måste godkänna villkoren för att signera.');

  const btn = document.getElementById('signBtn');
  btn.disabled = true;
  btn.textContent = 'Signerar...';

  try {
    // Get client IP for audit trail
    let clientIp = '';
    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const ipData = await ipRes.json();
      clientIp = ipData.ip || '';
    } catch(e) { clientIp = 'unknown'; }

    const { error } = await sb.from('quote_usage').update({
      signature_name: name,
      signature_date: new Date().toISOString(),
      signature_ip: clientIp,
      signature_status: 'signed'
    }).eq('share_id', _currentShareId);

    if (error) throw error;

    // Replace sign section with confirmation
    const signDate = new Date().toLocaleDateString('sv-SE', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    document.getElementById('signatureArea').innerHTML = `<div class="signed-badge">
      <h3>Offerten är godkänd!</h3>
      <p>Signerad av <strong>${name}</strong> den ${signDate}</p>
      <p style="margin-top:0.5rem;font-size:0.8rem;color:#888">Avsändaren har fått en bekräftelse.</p>
    </div>`;

  } catch (err) {
    console.error('Sign error:', err);
    alert('Kunde inte signera. Försök igen.');
    btn.disabled = false;
    btn.textContent = 'Godkänn offert';
  }
}

async function declineQuote() {
  if (!confirm('Är du säker på att du vill avböja offerten?')) return;

  try {
    await sb.from('quote_usage').update({
      signature_status: 'declined',
      signature_date: new Date().toISOString()
    }).eq('share_id', _currentShareId);

    document.getElementById('signatureArea').innerHTML = `<div class="declined-badge">
      <h3>Offerten har avböjts</h3>
      <p>Avsändaren har fått en notis.</p>
    </div>`;
  } catch (err) {
    alert('Kunde inte avböja. Försök igen.');
  }
}

loadQuote();
</script>
</body>
</html>
