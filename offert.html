<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offert – Offeria</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink: #0d0d0b; --paper: #f7f4ee; --cream: #ede8db; --gold: #b8902e; --gold-light: #e8d5a0; --border: #ddd8cc; }
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
.quote-doc {
  background: white; border: 1px solid var(--border); border-radius: 16px;
  padding: 2.5rem 2.5rem; max-width: 750px; width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06); font-size: 0.88rem; line-height: 1.7;
}
.q-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--gold-light); }
.q-company-name { font-family: 'Fraunces', serif; font-size: 1.3rem; margin-bottom: 0.3rem; }
.q-company-info { font-size: 0.75rem; color: #888; line-height: 1.7; }
.q-logo-preview { max-height: 80px; max-width: 140px; object-fit: contain; }
.q-meta-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
.q-offer-title { font-family: 'Fraunces', serif; font-size: 1.15rem; flex: 1; min-width: 200px; }
.q-meta { text-align: right; font-size: 0.8rem; }
.q-client { background: var(--cream); border-left: 4px solid var(--gold); padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; margin-bottom: 1.5rem; }
.q-client .lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #999; margin-bottom: 0.2rem; }
table.qt { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
table.qt th { background: var(--ink); color: white; padding: 0.6rem 0.8rem; text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
table.qt th:first-child { border-radius: 6px 0 0 0; }
table.qt th:last-child { border-radius: 0 6px 0 0; }
table.qt td { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--border); font-size: 0.84rem; }
table.qt tr:last-child td { border-bottom: none; }
.q-totals { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }
.q-totals-box { min-width: 260px; }
.trow { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.88rem; }
.trow.final-row { border-top: 2px solid var(--ink); margin-top: 0.5rem; padding-top: 0.7rem; font-weight: 700; font-size: 1.05rem; }
.rot-row { color: #2e7d32; }
.q-terms { background: var(--cream); border-radius: 8px; padding: 1rem 1.2rem; font-size: 0.79rem; color: #666; margin-bottom: 1.5rem; }
.q-terms h4 { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 0.5rem; }
.q-footer { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: #888; }
.sig-block { text-align: center; }
.sig-line { width: 180px; border-bottom: 1px solid #ccc; margin-bottom: 0.4rem; height: 40px; }
.loading { text-align: center; padding: 4rem 2rem; }
.loading h2 { font-family: 'Fraunces', serif; margin-bottom: 0.5rem; }
.error { text-align: center; padding: 4rem 2rem; color: #999; }
.brand-footer { margin-top: 2rem; text-align: center; }
.brand-footer a { font-family: 'Fraunces', serif; font-style: italic; color: var(--gold); text-decoration: none; font-weight: 700; font-size: 0.9rem; }
@media (max-width: 640px) {
  body { padding: 0.5rem; }
  .quote-doc { padding: 1.2rem; border-radius: 8px; font-size: 0.82rem; }
  .q-header { flex-direction: row; flex-wrap: nowrap; gap: 0.5rem; }
  .q-header > div:first-child { flex: 1; min-width: 0; }
  .q-logo-preview { max-height: 55px; max-width: 90px; }
  .q-company-name { font-size: 1rem; }
  .q-meta-row { flex-direction: column; gap: 0.5rem; }
  .q-meta { text-align: left; }
  table.qt { font-size: 0.75rem; }
  table.qt th, table.qt td { padding: 0.5rem 0.4rem; }
  .q-totals-box { width: 100%; min-width: unset; }
  .q-footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
}
@media print {
  body { padding: 0; background: white; }
  .quote-doc { box-shadow: none; border: none; border-radius: 0; padding: 1rem; }
  .brand-footer { display: none; }
}
</style>
</head>
<body>

<div id="quoteContainer">
  <div class="loading">
    <h2>Laddar offert...</h2>
    <p style="color:#999;font-size:0.9rem">Vänta ett ögonblick</p>
  </div>
</div>

<div class="brand-footer">
  <a href="https://offeria.se">Offeria</a>
  <span style="font-size:0.72rem;color:#ccc;margin-left:0.3rem">– Proffsiga offerter på sekunder</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://yfnmmcrvzcwcinwopnlj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlmbm1tY3J2emN3Y2lud29wbmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MzY4NjQsImV4cCI6MjA4NzUxMjg2NH0.MpF3oRLWwXkmrjEGJ0Qqrsw_87FixbaNHmHmPxFyXKc';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadQuote() {
  const container = document.getElementById('quoteContainer');
  const params = new URLSearchParams(window.location.search);
  const shareId = params.get('id');

  if (!shareId) {
    container.innerHTML = '<div class="error"><h2>Ingen offert angiven</h2><p>Kontrollera länken och försök igen.</p></div>';
    return;
  }

  try {
    const { data, error } = await sb
      .from('quote_usage')
      .select('quote_html, title, client_name, created_at')
      .eq('share_id', shareId)
      .single();

    if (error || !data) {
      container.innerHTML = '<div class="error"><h2>Offerten hittades inte</h2><p>Länken kan ha gått ut eller vara felaktig.</p></div>';
      return;
    }

    // Clean the HTML - remove edit controls, type selects, buttons
    let html = data.quote_html || '';
    // Remove type select dropdowns
    html = html.replace(/<select[^>]*class="row-type-select"[^>]*>[\s\S]*?<\/select>/gi, '');
    // Remove "Typ" table header
    html = html.replace(/<th[^>]*>Typ<\/th>/gi, '');
    // Remove contenteditable attributes
    html = html.replace(/\s*contenteditable="true"/gi, '');
    // Remove edit hints
    html = html.replace(/<div class="edit-hint">[\s\S]*?<\/div>/gi, '');
    // Remove add row buttons
    html = html.replace(/<div class="add-row-btn">[\s\S]*?<\/div>/gi, '');
    // Remove delete buttons
    html = html.replace(/<button[^>]*class="del-row-btn"[^>]*>[\s\S]*?<\/button>/gi, '');
    // Remove customer picker button
    html = html.replace(/<button[^>]*onclick="openCustomerPickerForQuote\(\)"[^>]*>[\s\S]*?<\/button>/gi, '');
    // Remove article picker buttons
    html = html.replace(/<button[^>]*onclick="openArticlePicker\(\)"[^>]*>[\s\S]*?<\/button>/gi, '');

    container.innerHTML = '<div class="quote-doc">' + html + '</div>';

    // Update page title
    document.title = (data.title || 'Offert') + ' – Offeria';

  } catch (e) {
    console.error('Error loading quote:', e);
    container.innerHTML = '<div class="error"><h2>Något gick fel</h2><p>Försök igen senare.</p></div>';
  }
}

loadQuote();
</script>
</body>
</html>
